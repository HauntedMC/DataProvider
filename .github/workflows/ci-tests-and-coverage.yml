name: CI Tests and Coverage

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Unit and Backend Integration Tests
        id: tests
        run: mvn -U -B -ntp -Pintegration-tests verify

      - name: Print failing test reports
        if: failure() && steps.tests.outcome == 'failure'
        shell: bash
        run: |
          find . -type f \( -path '*/target/surefire-reports/*.txt' -o -path '*/target/failsafe-reports/*.txt' \) -print0 \
            | sort -z \
            | xargs -0 -r -n1 sh -c 'echo "::group::$0"; cat "$0"; echo "::endgroup::"'

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          if-no-files-found: warn
          path: "**/target/site/jacoco"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          if-no-files-found: warn
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports
