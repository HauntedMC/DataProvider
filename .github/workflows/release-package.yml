name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Verify build
        run: mvn -U -B -ntp verify

      - name: Validate release version
        run: |
          PROJECT_VERSION="$(mvn -q -ntp -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PROJECT_VERSION" = "$TAG_VERSION" || { echo "Tag version does not match Maven project version." >&2; exit 1; }

      - name: Upload platform distributables
        uses: actions/upload-artifact@v7
        with:
          name: dataprovider-platform-jars
          if-no-files-found: error
          path: |
            dataprovider-platform-paper/target/dataprovider-platform-paper-*-bundled.jar
            dataprovider-platform-velocity/target/dataprovider-platform-velocity-*-bundled.jar

      - name: Publish to GitHub Packages (Maven)
        run: mvn -U -B -ntp -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: DataProvider ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dataprovider-platform-paper/target/dataprovider-platform-paper-*-bundled.jar
            dataprovider-platform-velocity/target/dataprovider-platform-velocity-*-bundled.jar
