orm:
  schema_mode: validate

execution:
  scope_shutdown_grace_ms: 2000
  runtime_shutdown_grace_ms: 5000
  messaging_subscriptions:
    global: 256
    per_plugin: 64
    per_connection: 32
  lanes:
    relational:
      workers: 8
      queue_capacity: 2048
      per_plugin_queue: 512
      per_resource_queue: 128
    document:
      workers: 8
      queue_capacity: 2048
      per_plugin_queue: 512
      per_resource_queue: 128
    redis:
      workers: 8
      queue_capacity: 2048
      per_plugin_queue: 512
      per_resource_queue: 128
    messaging:
      workers: 8
      queue_capacity: 4096
      per_plugin_queue: 1024
      per_resource_queue: 256

# Health checks and recovery use only DataProvider-owned bounded threads.  Application work is never retried.
resilience:
  workers: 2
  queue_capacity: 128
  health_interval_ms: 15000
  stale_threshold_ms: 45000
  failure_threshold: 3
  recovery_threshold: 1
  initial_backoff_ms: 1000
  max_backoff_ms: 30000
  jitter: 0.20
  shutdown_grace_ms: 2000

databases:
  mysql:
    enabled: true
  mongodb:
    enabled: true
  redis:
    enabled: true
  redis_messaging:
    enabled: true
