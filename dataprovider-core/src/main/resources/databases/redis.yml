default:
  host: "localhost"
  port: 6379
  user: "plugin"
  password: ""
  database: 0
  require_secure_transport: false
  tls:
    enabled: false
    verify_hostname: true
    trust_all_certificates: false
    trust_store_path: ""
    trust_store_password: ""
    trust_store_type: ""
  pool:
    connections: 8
    threads:     8
    queue_capacity: 1600
    min_idle: 2
    max_idle: 8
    test_on_borrow: true
    test_while_idle: true
  connection_timeout_ms: 2000
  socket_timeout_ms: 2000
  scan_count: 250
  security:
    max_scan_results: 10000
